<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Poppins:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body>
    <nav id="navbar">
      <!-- <img src="/img/logo4.png" alt="logo dreamypallete" class="logoImg" /> -->
      <h1>COLORFLY studio</h1>
      <select name="backgroundColor" id="backgroundColor">
        <option value="white">white</option>
        <option value="black" selected>black</option>
      </select>
    </nav>
    <main>
      <section id="paletteContainer"></section>
      <section id="interactionContainer">
        <button id="generateButton" class="generate-btn">Generate</button>
        <select name="format" id="format">
          <option value="hsl">HSL</option>
          <option value="hex" selected>HEX</option>
        </select>
        <div class="paletteInputs">
          <p>palette size:</p>
          <div>
            <input type="radio" name="size" id="six" value="6" checked />
            <label for="six">6</label>
            <input type="radio" name="size" id="eight" value="8" />
            <label for="eight">8</label>
            <input type="radio" name="size" id="nine" value="9" />
            <label for="nine">9</label>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <p class="footer-built">Built with <span class="heart">🖤</span> by</p>
      <p class="footer-signature">Solange Aimery</p>
      <p class="footer-copy">© 2026 Colorfly Studio. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
