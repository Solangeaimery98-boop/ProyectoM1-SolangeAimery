<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <nav>
      <img src="/img/logo4.png" alt="logo dreamypallete" class="logoImg" />
      <select name="backgroundColor" id="backgrounColor">
        <option value="white">white</option>
        <option value="black">black</option>
      </select>
    </nav>
    <main>
      <section id="paletteContainer"></section>
      <section id="interactionContainer">
        <button>generar paleta</button>
        <div class="paletteInputs">
          <p>palette size:</p>
          <div>
            <input type="radio" name="size" id="six" value="6" />
            <label for="rojo">6</label>

            <input type="radio" name="size" id="eight" value="8" checked />
            <label for="azul">8</label>

            <input type="radio" name="size" id="nine" value="9" />
            <label for="verde">9</label>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <h3>aqui va mi nombre</h3>
      <p>aqui irian los derechos reservados</p>
    </footer>
    <script src="/script.js"></script>
  </body>
</html>
